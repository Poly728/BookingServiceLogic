spring:
  application:
    name: booking-service-logic
  profiles:
    active: dev

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Liquibase Configuration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

# Server Configuration
server:
  port: 8081
  servlet:
    context-path: /api/v1

# Logging Configuration
logging:
  level:
    org.example.bookingservicelogic: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
